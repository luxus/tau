<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tau</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>τ</text></svg>">
  <!-- Using system fonts: SF Pro, SF Mono -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="mode-toggle" id="mode-toggle">
          <a href="index.html" class="mode-link active" title="Chat">τ</a>
          <a href="memoryd.html" class="mode-link" id="memoryd-link" title="Memory" style="display:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 18V5"/><path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/><path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/><path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/><path d="M18 18a4 4 0 0 0 2-7.464"/><path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/><path d="M6 18a4 4 0 0 1-2-7.464"/><path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
            </svg>
          </a>
        </div>
        <input type="text" id="session-search-input" class="sidebar-search-input" placeholder="Search..." autocomplete="off" />
        <div class="sidebar-actions">
          <button class="icon-btn" id="refresh-sessions-btn" title="Refresh sessions">↻</button>
          <button class="new-session-btn" id="new-session-btn" title="New Session">+</button>
        </div>
      </div>
      <div class="session-list" id="session-list">
        <div class="session-loading">Loading sessions...</div>
      </div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Chat Area -->
    <div class="main">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">☰</button>
          <button class="model-btn" id="model-btn" title="Switch model"></button>
        </div>
        <div class="header-right">
          <div class="session-cost" id="session-cost" title="Session cost"></div>
          <div class="token-usage" id="token-usage" title="Context window usage"></div>

          <div class="status">
            <span class="status-indicator" id="status-indicator"></span>
            <span class="status-text" id="status-text">Connecting...</span>
          </div>
          <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">τ</div>
          <p>Welcome to Tau</p>
          <p class="hint">Type a message below to start chatting with Pi, or select a session from the sidebar.</p>
          <div class="shortcuts-hint">
            <span>/ Focus input</span>
            <span>Esc Abort</span>
          </div>
        </div>
      </div>

      <!-- Scroll to bottom + new message indicator -->
      <button class="scroll-bottom-btn hidden" id="scroll-bottom-btn">
        <span class="scroll-bottom-badge hidden" id="scroll-bottom-badge">New ↓</span>
        <span class="scroll-bottom-icon">↓</span>
      </button>

      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <!-- Image preview strip -->
        <div class="image-previews hidden" id="image-previews"></div>
        <form id="chat-form">
          <div class="input-left-actions">
            <button type="button" class="input-icon-btn" id="command-btn" title="Commands">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></svg>
            </button>
            <button type="button" class="input-icon-btn" id="attach-btn" title="Attach image">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            </button>
            <button type="button" class="input-icon-btn" id="cycle-thinking-btn" title="Cycle thinking">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 0 0-8 8c0 3.4 2.1 6.3 5 7.4V20h6v-2.6c2.9-1.1 5-4 5-7.4a8 8 0 0 0-8-8z"/><path d="M10 22h4"/></svg>
            </button>
            <button type="button" class="input-icon-btn" id="cycle-model-btn" title="Cycle model">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
            <input type="file" id="image-input" accept="image/*" multiple style="display:none" />
          </div>
          <textarea 
            id="message-input" 
            placeholder="Type a message... (Enter to send, Shift+Enter for newline)" 
            autocomplete="off"
            rows="2"
            autofocus
          ></textarea>
          <div class="input-actions">
            <button type="submit" id="send-btn" title="Send message">
              <span class="send-icon">↑</span>
            </button>
            <button type="button" id="abort-btn" class="hidden" title="Abort (Esc)">■</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div class="settings-overlay hidden" id="settings-overlay"></div>

  <!-- Settings Panel -->
  <div class="settings-panel hidden" id="settings-panel">
    <div class="settings-header">
      <h3>Settings</h3>
      <button class="settings-close" id="settings-close">✕</button>
    </div>
    <div class="settings-body">
      <!-- Appearance -->
      <div class="settings-section">
        <div class="settings-section-title">Appearance</div>
        <div class="theme-grid" id="theme-grid"></div>
      </div>
      <!-- Agent -->
      <div class="settings-section">
        <div class="settings-section-title">Agent</div>
        <div class="settings-row" id="setting-auto-compact">
          <span class="settings-label">Auto-compaction</span>
          <button class="settings-toggle" id="toggle-auto-compact"></button>
        </div>
        <div class="settings-row" id="setting-thinking">
          <span class="settings-label">Thinking level</span>
          <button class="settings-value-btn" id="btn-thinking-level"></button>
        </div>
      </div>

    </div>

  </div>

  <!-- Command Palette -->
  <div class="command-palette-overlay hidden" id="command-palette-overlay"></div>
  <div class="command-palette hidden" id="command-palette">
    <div class="command-palette-header">Commands</div>
    <div class="command-list" id="command-list"></div>
  </div>

  <!-- Model Picker -->
  <div class="model-picker-overlay hidden" id="model-picker-overlay"></div>
  <div class="model-picker hidden" id="model-picker">
    <div class="model-picker-header">Model</div>
    <div class="model-list" id="model-list"></div>
  </div>

  <!-- Dialog Container -->
  <div id="dialog-container" class="hidden"></div>

  <!-- Scripts -->
  <script>
    fetch('/api/memoryd/check').then(r=>r.json()).then(d=>{
      if(d.installed) document.getElementById('memoryd-link').style.display='';
    }).catch(()=>{});
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
